name: Deploy web to GitHub Pages

on:
  push:
    branches: [main, master]
  workflow_dispatch:
    inputs:
      vite_base:
        description: >
          Optional override for VITE_BASE. Use "/" for a custom domain at site root.
          Leave empty to use the PAGES_VITE_BASE repo variable, or default /{repo}/ for *.github.io/RepoName/.
        required: false
        default: ""
        type: string

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: web/package-lock.json
      - name: Install
        working-directory: web
        run: npm ci
      - name: Resolve VITE_BASE
        id: vite_base
        env:
          # workflow_dispatch only; empty on push
          MANUAL_INPUT: ${{ github.event_name == 'workflow_dispatch' && github.event.inputs.vite_base || '' }}
        run: |
          DEFAULT='/${{ github.event.repository.name }}/'
          MANUAL="$MANUAL_INPUT"
          FROM_VARS='${{ vars.PAGES_VITE_BASE }}'
          if [ "${{ github.event_name }}" = "workflow_dispatch" ] && [ -n "$MANUAL" ]; then
            OUT="$MANUAL"
          elif [ -n "$FROM_VARS" ]; then
            OUT="$FROM_VARS"
          else
            OUT="$DEFAULT"
          fi
          echo "Resolved VITE_BASE=$OUT"
          echo "vite_base=$OUT" >> "$GITHUB_OUTPUT"
      - name: Build
        working-directory: web
        env:
          VITE_BASE: ${{ steps.vite_base.outputs.vite_base }}
        run: npm run build
      - uses: actions/upload-pages-artifact@v3
        with:
          path: web/dist

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - id: deployment
        uses: actions/deploy-pages@v4
